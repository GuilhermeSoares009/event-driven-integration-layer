services:
  integration-service:
    build:
      context: ./service
      dockerfile: Dockerfile
    container_name: integration_layer_service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: integration_layer
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      WEBHOOK_PROVIDER_TEST_SECRET: ${WEBHOOK_PROVIDER_TEST_SECRET:-test-secret}
      INTEGRATION_RATE_LIMITS_DEFAULT_PER_MINUTE: ${INTEGRATION_RATE_LIMITS_DEFAULT_PER_MINUTE:-60}
      INTEGRATION_CIRCUIT_BREAKER_FAILURE_THRESHOLD: ${INTEGRATION_CIRCUIT_BREAKER_FAILURE_THRESHOLD:-5}
      INTEGRATION_CIRCUIT_BREAKER_OPEN_SECONDS: ${INTEGRATION_CIRCUIT_BREAKER_OPEN_SECONDS:-120}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - integration-layer
    expose:
      - "8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: integration_layer_nginx
    depends_on:
      integration-service:
        condition: service_started
    ports:
      - "8080:80"
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - integration-layer

  postgres:
    image: postgres:16-alpine
    container_name: integration_layer_postgres
    environment:
      POSTGRES_DB: integration_layer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d integration_layer"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - integration-layer

  redis:
    image: redis:7-alpine
    container_name: integration_layer_redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - integration-layer

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: integration_layer_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - integration-layer

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: integration_layer_kafka
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - integration-layer

volumes:
  postgres_data:

networks:
  integration-layer:
    name: integration-layer-network
