spring:
  application:
    name: integration-layer-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:integration_layer}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always

logging:
  level:
    root: INFO

integration:
  providers: {}
  rate-limits:
    default-per-minute: 60
    providers: {}
  circuit-breaker:
    failure-threshold: 5
    open-seconds: 120
  retention:
    inbox-days: 30
    outbox-days: 30
  processing:
    inbox:
      schedule-ms: 2000
      batch-size: 50
      max-attempts: 5
    outbox:
      schedule-ms: 2000
      batch-size: 50
      max-attempts: 5
  outbox:
    kafka:
      topic-prefix: integration.outbox
